<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bing Searcher</title>
    <link rel="stylesheet" href="custom.css">
</head>
<body>
    <img src="logo-small.webp" alt="Bing Searcher Logo">
    <h1>Bing Searcher</h1>
    <p>Automatically runs Bing searches to collect Microsoft Rewards points. Supports PC and mobile search.</p>
    <p id="status" class="status">Idle</p>
    <button id="startButton">Start PC Search</button>
    <button id="mobileSearchButton">Start Mobile Search</button>
    <button id="stopButton" disabled>Stop Search</button>
    <button id="emergencyStopButton" disabled>Emergency Stop</button>
    <script src="popup.js"></script>
</body>
</html>
